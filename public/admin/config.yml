                      - { label: Description, name: description, widget: text }
                      - { label: Label champ lien video, name: videoField, widget: string, required: false }
                      - { label: Label bouton envoi, name: submitLabel, widget: string }
                      - { label: Label reglement, name: regulationLabel, widget: string, required: false }
                      - { label: URL reglement, name: regulationUrl, widget: string, required: false }
                      - { label: Message aide, name: notice, widget: text, required: false }

              - label: Mentions legales
