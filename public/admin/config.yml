                  - label: Hero
                    name: hero
                    widget: object
                    fields:
                      - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                      - { label: Titre, name: title, widget: string }
                      - { label: Sous-titre, name: subtitle, widget: text }
                      - { label: Image (URL), name: image, widget: string, required: false }
                      - { label: Label CTA, name: ctaLabel, widget: string, required: false }
                      - { label: URL CTA, name: ctaUrl, widget: string, required: false }
                      - label: CTA secondaire
                        name: secondaryAction
                        widget: object
                        required: false
                        fields:
                          - { label: Label, name: label, widget: string, required: false }
                          - { label: URL, name: url, widget: string, required: false }
                  - { label: Titre theme, name: themeTitle, widget: string }
                  - { label: Texte theme, name: themeText, widget: text }
                  - { label: Image theme (URL), name: themeImage, widget: string, required: false }
