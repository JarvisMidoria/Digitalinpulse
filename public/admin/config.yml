                      - { label: Texte, name: text, widget: text }
                      - { label: Image (URL), name: image, widget: string, required: false }
                  - { label: Titre alumni, name: alumniTitle, widget: string }
                  - { label: Texte alumni, name: alumniText, widget: text }

              - label: Tech For Competitivity
                name: tech_for_competitivity
                widget: object
